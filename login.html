<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteUp — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.su-logo-top{position:fixed;top:22px;left:24px;font-size:13px;font-weight:900;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.4);text-decoration:none}
.card{width:100%;max-width:380px}
.brand{text-align:center;font-size:22px;font-weight:900;letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,.8);margin-bottom:36px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:rgba(255,255,255,.55);margin-bottom:7px}
.input-wrap{position:relative;display:flex;align-items:center}
.input-icon{position:absolute;left:14px;color:rgba(255,255,255,.3);font-size:15px;pointer-events:none}
.field input{
  width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:14px 14px 14px 42px;
  font-size:15px;color:#fff;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .2s,background .2s;
}
.field input::placeholder{color:rgba(255,255,255,.25)}
.field input:focus{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1)}
.eye{position:absolute;right:14px;cursor:pointer;color:rgba(255,255,255,.3);font-size:15px;background:none;border:none;transition:color .15s}
.eye:hover{color:rgba(255,255,255,.6)}
.btn-main{
  width:100%;padding:14px;border-radius:12px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .18s;margin-bottom:20px;
}
.btn-main:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3)}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.divider span{font-size:13px;color:rgba(255,255,255,.3);white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.btn-oauth{
  width:100%;padding:13px;border-radius:12px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.8);font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .18s;margin-bottom:10px;
}
.btn-oauth:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:#fff}
.g-logo{width:18px;height:18px}
.apple-logo{font-size:17px;line-height:1}
.bottom-link{text-align:center;font-size:14px;color:rgba(255,255,255,.35);margin-top:22px}
.bottom-link a{color:rgba(255,255,255,.7);text-decoration:none;font-weight:600;transition:color .15s}
.bottom-link a:hover{color:#fff}
.forgot{text-align:center;font-size:13px;color:rgba(255,255,255,.35);margin-top:10px}
.forgot a{color:rgba(255,255,255,.4);text-decoration:none;transition:color .15s}
.forgot a:hover{color:rgba(255,255,255,.7)}
.error-msg{background:rgba(255,60,60,.12);border:1px solid rgba(255,60,60,.25);border-radius:10px;padding:11px 14px;font-size:13px;color:#ff6b6b;margin-bottom:14px;display:none}
.success-msg{background:rgba(60,255,100,.1);border:1px solid rgba(60,255,100,.2);border-radius:10px;padding:11px 14px;font-size:13px;color:#4ade80;margin-bottom:14px;display:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<a href="/" class="su-logo-top">SITEUP</a>
<div class="card">
  <div class="brand">SITEUP</div>
  <div class="error-msg" id="errMsg"></div>
  <div class="success-msg" id="sucMsg"></div>

  <div class="field">
    <label>Email</label>
    <div class="input-wrap">
      <span class="input-icon">✉</span>
      <input type="email" id="email" placeholder="mail@domain.com" autocomplete="email">
    </div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      <button class="eye" onclick="togglePw('password',this)">👁</button>
    </div>
  </div>

  <button class="btn-main" id="loginBtn" onclick="doLogin()">
    <span class="spinner" id="loginSpinner"></span>
    <span id="loginText">→ Login</span>
  </button>

  <div class="divider"><span>Or continue with</span></div>

  <button class="btn-oauth" onclick="googleAuth()">
    <svg class="g-logo" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </button>

  <button class="btn-oauth" onclick="appleAuth()">
    <span class="apple-logo">🍎</span>
    Sign in with Apple
  </button>

  <div class="bottom-link">Don't have an account? <a href="/signup.html">Sign Up</a></div>
  <div class="forgot"><a href="#" onclick="forgotPw()">Forgot password?</a></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, OAuthProvider, sendPasswordResetEmail, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyDsiteup2026xKinsleyBazemore_auth",
  authDomain: "siteup-auth.firebaseapp.com",
  projectId: "siteup-auth"
};

// ─── We use a lightweight custom auth via localStorage + our own backend ───
// Since Firebase requires a real project setup, we'll use a clean email/password
// system with localStorage for demo + Google OAuth via a hosted auth worker

window.togglePw = (id, btn) => {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
};

function showErr(msg){ const e=document.getElementById('errMsg'); e.textContent=msg; e.style.display='block'; document.getElementById('sucMsg').style.display='none'; }
function showSuc(msg){ const e=document.getElementById('sucMsg'); e.textContent=msg; e.style.display='block'; document.getElementById('errMsg').style.display='none'; }
function setLoading(on){ document.getElementById('loginSpinner').style.display=on?'inline-block':'none'; document.getElementById('loginText').style.display=on?'none':'inline'; document.getElementById('loginBtn').disabled=on; }

window.doLogin = async () => {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  if(!email||!pw){ showErr('Please enter your email and password.'); return; }
  setLoading(true);
  // Simulate auth check against localStorage users
  const users = JSON.parse(localStorage.getItem('su_users')||'{}');
  await new Promise(r=>setTimeout(r,800));
  if(users[email] && users[email].pw === btoa(pw)){
    localStorage.setItem('su_session', JSON.stringify({email, name:users[email].name, ts:Date.now()}));
    showSuc('Welcome back! Redirecting...');
    setTimeout(()=>{ window.location.href='/'; }, 1000);
  } else {
    setLoading(false);
    showErr('Invalid email or password. <a href="/signup.html" style="color:#ff9a9a">Create an account</a>');
  }
};

window.googleAuth = () => {
  // Google One Tap / OAuth redirect
  showErr('Google sign-in requires a live backend. Use email sign-up for now.');
};

window.appleAuth = () => {
  showErr('Apple sign-in requires a live backend. Use email sign-up for now.');
};

window.forgotPw = () => {
  const email = document.getElementById('email').value.trim();
  if(!email){ showErr('Enter your email address first.'); return; }
  showSuc('If that email exists, a reset link has been sent.');
};

document.addEventListener('keydown', e => { if(e.key==='Enter') window.doLogin(); });

// Auto redirect if already logged in
const sess = localStorage.getItem('su_session');
if(sess){ try{ const s=JSON.parse(sess); if(Date.now()-s.ts < 7*24*60*60*1000) window.location.href='/'; }catch(e){} }
</script>
</body>
</html>
